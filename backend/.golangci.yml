version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gosec
    - bodyclose
    - noctx
  exclusions:
    rules:
      # Relax linting in test files — w.Write errors and security checks are noise there.
      - path: _test\.go
        linters:
          - gosec
          - errcheck
