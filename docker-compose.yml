services:
  shelfarr:
    build: .
    ports:
      - "8008:8008"
    volumes:
      - ./data:/data
      - ./downloads:/downloads/audiobooks
      - ./library:/audiobooks
    environment:
      # ── Database ──────────────────────────────────────────────────────────
      DB_PATH: /data/shelfarr.db

      # ── Prowlarr ──────────────────────────────────────────────────────────
      PROWLARR_URL: http://prowlarr:9696
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}

      # ── qBittorrent ───────────────────────────────────────────────────────
      QBIT_URL: http://qbittorrent:8080
      QBIT_USERNAME: ${QBIT_USERNAME}
      QBIT_PASSWORD: ${QBIT_PASSWORD}
      QBIT_CATEGORY: shelfarr

      # ── Library ───────────────────────────────────────────────────────────
      LIBRARY_DIR: /audiobooks
      # WATCH_DIR defaults to qBittorrent's save path (read via API at startup).
      # Set explicitly only when using Syncthing from a remote seedbox.
      WATCH_DIR: /downloads/audiobooks
      WATCH_TIMEOUT: 24h

      # ── AudioBookShelf ────────────────────────────────────────────────────
      ABS_URL: ${ABS_URL:-http://audiobookshelf:13378}

      # ── Discord ───────────────────────────────────────────────────────────
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}

      # ── Auth ──────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h

      # ── Server ────────────────────────────────────────────────────────────
      PORT: "8008"
      STATIC_DIR: /app/static
    restart: always
