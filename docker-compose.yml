services:
  shelfarr:
    image: ghcr.io/keestucker/shelfarr:latest
    # build: .  # uncomment to build from source instead
    user: "1000:1000"
    ports:
      - "8008:8008"
    volumes:
      - ./data:/data
      - ./downloads:/downloads
      - ./library:/books
    environment:
      PROWLARR_URL: http://prowlarr:9696
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      QBIT_URL: http://qbittorrent:8080
      QBIT_USERNAME: ${QBIT_USERNAME}
      QBIT_PASSWORD: ${QBIT_PASSWORD}
      QBIT_CATEGORY: shelfarr
      # QBIT_IMPORTED_CATEGORY: shelfarr-imported  # optional: set this category on the torrent after the file is imported to the library
      QBIT_AUTO_TMM: "true"
      QBIT_DELETE_ON_REQUEST_DELETE: "false"
      WATCH_DIR: /downloads
      WATCH_TIMEOUT: 24h
      ABS_URL: ${ABS_URL:-http://audiobookshelf:80}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      # COOKIE_INSECURE: "true"  # uncomment only for local dev over plain HTTP (no HTTPS/Cloudflare)
    restart: always
